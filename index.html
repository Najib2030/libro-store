<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2c3e66">
  <title>LibroCart | Library Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="customer.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="main-header">
      <div class="logo-area">
        <div class="logo">
          <div class="logo-icon">📚</div>
          <div class="logo-text">
            <h1>LibroCart</h1>
            <span>Library essentials</span>
          </div>
        </div>
        <div id="userInfoContainer" class="user-info-container" style="display: none;">
          <div class="user-fullname"></div>
          <div class="user-subname"></div>
        </div>
      </div>
      <div class="header-actions">
        <button id="logoutUserBtn" class="cart-btn" style="display: none;">🚪 Logout</button>
        <button id="languageToggle" class="icon-btn" title="Change language">🌐 EN</button>
        <button id="darkModeToggle" class="icon-btn" aria-label="Dark mode">
          <span class="dark-icon">🌙</span>
          <span class="light-icon">☀️</span>
        </button>
        <button id="cartButton" class="cart-btn">
          🛒 <span id="cartText">Cart</span> <span id="cartCountBadge" class="cart-count">0</span>
        </button>
        <button id="loginBtn" class="cart-btn">🔑 Sign in with Google</button>
        <button id="chatBtn" class="cart-btn" style="display: none;">
          💬 <span>Chat with Seller</span>
          <span id="chatUnreadBadge" class="unread-badge" style="display: none;">0</span>
        </button>
      </div>
    </header>

    <main class="customer-main">
      <div class="hero-section">
        <h2 id="heroTitle">Discover literary treasures</h2>
        <p id="heroSubtitle">Handpicked collection for readers & dreamers</p>
      </div>
      <!-- Store closed banner will be inserted here dynamically by JavaScript -->

      <!-- Category Sidebar + Product Grid -->
      <div class="customer-layout">
        <div class="mobile-sidebar-header">
          <button id="mobileCategoryToggle" class="hamburger-toggle">
            <span class="hamburger-icon">☰</span>
            <span id="mobileCategoryText">Categories</span>
          </button>
        </div>
        <aside class="category-sidebar" id="categorySidebar">
          <div class="sidebar-header">
            <h3 id="sidebarTitle">📚 Categories</h3>
            <button class="close-sidebar-btn" id="closeSidebarBtn">&times;</button>
          </div>
          <div class="category-list" id="categoryList">
            <button class="category-btn active" data-category="all">All</button>
          </div>
        </aside>
        <div class="customer-content">
          <div class="filter-bar">
            <div class="search-wrapper">
              <span class="search-icon">🔍</span>
              <input type="text" id="productSearch" placeholder="Search by name or description..." class="search-input">
            </div>
            <div class="sort-wrapper">
              <label id="sortLabel">Sort by:</label>
              <select id="productSort" class="sort-select"></select>
            </div>
          </div>
          <div id="customerProductGrid" class="product-grid">
            <div class="loading-skeleton">Loading products...</div>
          </div>
        </div>
      </div>
    </main>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
      <div class="modal-content cart-modal">
        <div class="modal-header">
          <h3 id="cartModalTitle">🛒 Your Cart</h3>
          <button class="close-modal" id="closeCartBtn">&times;</button>
        </div>
        <div id="cartItemsList" class="cart-items-container">Cart is empty</div>
        <div class="cart-footer">
          <div id="cartTotal" class="total-row">Total: 0.00 DH</div>
          <div class="cart-buttons">
            <button id="clearCartBtn" class="btn-outline">🗑️ Clear Cart</button>
            <button id="sendOrderBtn" class="btn-primary">📨 Send Order</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Username Setup Modal (first time login) -->
    <div id="usernameModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="usernameModalTitle">✨ Choose a username</h3>
        </div>
        <div style="padding: 20px;">
          <input type="text" id="usernameInput" placeholder="Username (unique, visible to seller)" class="modern-input">
          <button id="saveUsernameBtn" class="btn-primary full-width" style="margin-top: 16px;">Save & Continue</button>
        </div>
      </div>
    </div>

    <!-- Chat Modal (Redesigned) -->
    <div id="chatModal" class="modal chat-fullscreen">
      <div class="modal-content chat-modal-content">
        <div class="chat-header">
          <div class="chat-header-info">
            <div class="chat-avatar">📚</div>
            <div class="chat-header-text">
              <h3 id="chatHeaderTitle">LibroCart Support</h3>
              <span id="chatHeaderStatus">Online</span>
            </div>
          </div>
          <button class="close-modal" id="closeChatBtn">&times;</button>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input-area">
          <input type="text" id="chatInput" placeholder="Type a message..." class="modern-input">
          <button id="sendChatBtn" class="btn-primary">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="customer.js"></script>
</body>
</html>
